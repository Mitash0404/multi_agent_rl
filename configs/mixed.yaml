experiment:
  name: mixed_baseline
  seed: 44

env:
  height: 8
  width: 8
  num_agents: 3
  num_obstacles: 8
  num_resources: 6
  max_steps: 80
  observation_mode: full
  view_radius: 2
  communication_vocab_size: 0

reward:
  mode: mixed
  step_penalty: -0.02
  collision_penalty: -0.25
  resource_reward: 1.0
  goal_reward: 6.0
  team_reward_weight: 0.6
  individual_reward_weight: 0.8
  competitive_steal_penalty: 0.2

training:
  policy_mode: independent
  num_episodes: 400
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_episodes: 280
  checkpoint_interval: 100
  eval_interval: 40
  eval_episodes: 12
  log_interval: 10
  device: cpu

dqn:
  gamma: 0.99
  lr: 0.0007
  batch_size: 64
  buffer_size: 75000
  min_buffer_size: 800
  target_update_interval: 200
  gradient_clip_norm: 10.0
  hidden_dim: 256
